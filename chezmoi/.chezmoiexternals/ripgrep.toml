[".local/bin/rg"]
type = "archive-file"
url = "https://github.com/BurntSushi/ripgrep/releases/download/{{ (gitHubLatestRelease 'BurntSushi/ripgrep').TagName }}/ripgrep-{{ (gitHubLatestRelease 'BurntSushi/ripgrep').TagName }}-{{ .chezmoi.arch }}-{{ if -eq .chezmoi.os 'windows' }}pc-windows-msvc.zip{{ else if -eq .chezmoi.os 'darwin' }}apple-darwin.tar.gz{{ else }}unknown-linux-musl.tar.gz{{ end }}"
path = "ripgrep-{{ (gitHubLatestRelease 'BurntSushi/ripgrep').TagName }}-{{ .chezmoi.arch }}-{{ if -eq .chezmoi.os 'windows' }}pc-windows-msvc{{ else if -eq .chezmoi.os 'darwin' }}apple-darwin{{ else }}unknown-linux-musl{{ end }}/rg"
executable = true
readonly = true
refreshPeriod = "168h"

