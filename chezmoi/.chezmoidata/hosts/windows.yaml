        - Microsoft.VCRedist.2015+.x86
        - Microsoft.VisualStudio.2022.Community
        - Microsoft.WindowsSDK.10.0.19041
        - Microsoft.WindowsSDK.10.0.22000
        - Microsoft.WindowsTerminal
        - Microsoft.WingetCreate
        - Mozilla.Firefox
