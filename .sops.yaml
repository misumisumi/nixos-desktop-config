creation_rules:
  - path_regex: sops/hosts/mother/*
    key_groups:
      - pgp:
          - *sumi_pgp
        age:
          - *mother
  - path_regex: sops/hosts/stacia/*
    key_groups:
      - pgp:
          - *sumi_pgp
        age:
          - *stacia
  - path_regex: sops/hosts/zephyrus/*
    key_groups:
      - pgp:
          - *sumi_pgp
        age:
          - *zephyrus
  - path_regex: sops/users/sumi/*
    key_groups:
      - pgp:
          - *sumi_pgp
        age:
          - *sumi_age
  - path_regex: sops/users/kobayashi/*
    key_groups:
      - pgp:
          - *sumi_pgp
        age:
          - *kobayashi_age
  # system scoop configs
  - path_regex: sops/system/network/wireless
    key_groups:
      - pgp:
          - *sumi_pgp
        age:
          - *zephyrus
  - path_regex: sops/system/openfortivpn/config
    key_groups:
      - pgp:
          - *sumi_pgp
        age:
          - *mother
          - *zephyrus
  - path_regex: sops/system/ppp
    key_groups:
      - pgp:
          - *sumi_pgp
        age:
          - *mother
          - *zephyrus
  # user scoop configs
  - path_regex: sops/pkgs/ssh/{desktops,homelab}$
    key_groups:
      - pgp:
          - *sumi_pgp
        age:
          - *sumi_age
  - path_regex: sops/pkgs/ssh/univ$
    key_groups:
      - pgp:
          - *sumi_pgp
        age:
          - *sumi_age
          - *kobayashi_age
  - path_regex: sops/pkgs/ai-tools/*
    key_groups:
      - pgp:
          - *sumi_pgp
        age:
          - *sumi_age
          - *kobayashi_age
  - path_regex: sops/pkgs/wezterm/[^/]+\.lua$
    key_groups:
      - pgp:
          - *sumi_pgp
        age:
          - *sumi_age
          - *kobayashi_age
